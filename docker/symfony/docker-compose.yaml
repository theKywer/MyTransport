services:
  
  symfony-php:
    build: ./php
    container_name: SymfonyPHP
    volumes:
      - ../../apps/symfony:/var/www/html
      - ./.env:/var/www/html/.env
    working_dir: /var/www/html
    environment:
      - APP_ENV=${APP_ENV:-dev}
      # - APP_DEBUG=${SYMFONY_APP_DEBUG:-1}
      - DEFAULT_URI=${DEFAULT_URI}
    networks:
      - MyTransportNetwork

  symfony-nginx:
    image: nginx:alpine
    container_name: SymfonyNginx
    ports:
      - "${NGINX_HOST_PORT}:80"
    volumes:
      - ../../apps/symfony:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    working_dir: /var/www/html
    depends_on:
      - symfony-php
    networks:
      - MyTransportNetwork

networks:
  MyTransportNetwork:
    external: true