services:

  yii-php:
    build: ./php
    container_name: YiiPHP
    volumes:
      - ../../apps/yii:/var/www/html:delegated
      - ./.env:/var/www/html/.env
    working_dir: /var/www/html
    environment:
      - YII_DEBUG=${YII_DEBUG}
      - YII_ENV=${YII_ENV}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    networks:
      - MyTransportNetwork

  yii-nginx:
    image: nginx:alpine
    container_name: YiiNginx
    ports:
      - "${NGINX_HOST_PORT}:80"
    volumes:
      - ../../apps/yii:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    working_dir: /var/www/html
    depends_on:
      - yii-php
    networks:
      - MyTransportNetwork

networks:
  MyTransportNetwork:
    external: true