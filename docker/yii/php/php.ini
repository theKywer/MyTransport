; =============================================================================
; Основные настройки Yii2
; =============================================================================

; Временная зона (обязательно!)
date.timezone = Europe/Moscow

; Лимит памяти (рекомендуется для Yii2)
memory_limit = 512M

; Максимальный размер загружаемого файла
upload_max_filesize = 100M
post_max_size = 108M

; Максимальное время выполнения скрипта
max_execution_time = 300
max_input_time = 60

; Количество POST переменных
max_input_vars = 3000

; Размер буфера вывода
output_buffering = 4096

; Отключение вывода ошибок на экран (для продакшена)
display_errors = Off
display_startup_errors = Off

; Логирование ошибок
log_errors = On
error_log = /var/log/php_errors.log

; Уровень логирования (все, кроме NOTICE)
error_reporting = E_ALL & ~E_NOTICE & ~E_DEPRECATED & ~E_STRICT

; =============================================================================
; OPcache — ускорение выполнения PHP (обязательно для продакшена)
; =============================================================================

; Включить OPcache
opcache.enable = 1
opcache.enable_cli = 0

; Память для OPcache
opcache.memory_consumption = 256

; Количество строк в interned-строках
opcache.interned_strings_buffer = 16

; Максимальное количество кэшируемых файлов
opcache.max_accelerated_files = 20000

; Проверка timestamp'ов (Off — в продакшене, On — в разработке)
opcache.validate_timestamps = Off

; Частота проверки (только если validate_timestamps = On)
opcache.revalidate_freq = 60

; Сохранение комментариев (нужно для некоторых инструментов)
opcache.save_comments = 1

; Быстрое завершение
opcache.fast_shutdown = 1

; Предварительная загрузка скриптов (опционально)
; opcache.preload = /var/www/html/preload.php

; =============================================================================
; Расширения (должны быть установлены в Dockerfile)
; =============================================================================

; GD (для работы с изображениями)
gd.jpeg_ignore_warning = 1

; =============================================================================
; Безопасность
; =============================================================================

; Отключить опасные функции
disable_functions = exec,passthru,shell_exec,system,proc_open,popen

; Ограничение include файлов только в корне
open_basedir = /var/www/html:/tmp:/var/log

; Запрет на загрузку .htaccess и других скрытых файлов
cgi.fix_pathinfo = 0

; =============================================================================
; Сессии
; =============================================================================

; Хранение сессий
session.save_handler = files
session.save_path = "/tmp"

; Безопасность сессий
session.cookie_httponly = 1
session.cookie_secure = 0 ; включить, если используется HTTPS
session.use_strict_mode = 1
session.use_only_cookies = 1

; =============================================================================
; Другие полезные настройки
; =============================================================================

; Автозагрузка файлов
auto_prepend_file =
auto_append_file =

; Компрессия вывода (лучше на уровне Nginx)
zlib.output_compression = Off

; Использование realpath cache (ускоряет работу)
realpath_cache_size = 4096k
realpath_cache_ttl = 600
